site_name: Kirschenkrönung
site_description: Dokumentation für Anwender und technische Hintergründe
docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true

theme:
  name: material
  language: de
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

extra:
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - plantuml_markdown:
      format: svg_inline
  - tables
  - toc:
      permalink: true

nav:
  - Start: 
      - Überblick: index.md
      - Begrifflichkeiten: begrifflichkeiten.md
  - Benutzerdokumentation:
      - Überblick: user-guide/index.md      
      - Installation: user-guide/installation.md
      - Konfiguration: user-guide/konfiguration.md
      - Test: user-guide/test.md
      - Veranstaltung: user-guide/veranstaltung.md
  - Technischer Hintergrund:
      - Überblick: technical/index.md
      - Schalldruckpegelmessung: technical/schalldruckpegelmessung.md
      - Softwarearchitektur: technical/architecture.md
  - Troubleshooting:
      - Überblick: troubleshooting/index.md
      - FAQs: troubleshooting/faq.md
